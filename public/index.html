<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐟 Msuiting's Pond</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sun: #FFE156;
    --coral: #FF6B6B;
    --mint: #51CF66;
    --sky: #4DABF7;
    --lavender: #B197FC;
    --peach: #FFA94D;
    --pink: #F06595;
    --cream: #FFF9EC;
    --ink: #2D3436;
  }

  body {
    font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    cursor: default;
  }

  /* ===== Doodle Background Layer ===== */
  .doodle-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  .floater {
    position: absolute;
    animation: floatAround 8s ease-in-out infinite;
  }

  @keyframes floatAround {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(15px, -20px) rotate(5deg); }
    50% { transform: translate(-10px, -35px) rotate(-3deg); }
    75% { transform: translate(-20px, -10px) rotate(4deg); }
  }

  @keyframes floatAround2 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(-18px, -25px) rotate(-6deg); }
    66% { transform: translate(12px, -15px) rotate(3deg); }
  }

  @keyframes floatAround3 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(20px, -30px) rotate(8deg); }
  }

  @keyframes bobble {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes wiggleDoodle {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  @keyframes popIn {
    0% { transform: scale(0) rotate(-30deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(5deg); }
    80% { transform: scale(0.95) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @keyframes rainbow {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }

  @keyframes scribble {
    0% { stroke-dashoffset: 1000; }
    100% { stroke-dashoffset: 0; }
  }

  /* ===== Main Container ===== */
  .container {
    position: relative; z-index: 2;
    text-align: center;
    padding: 20px;
    max-width: 500px;
    width: 100%;
  }

  /* ===== Title Area ===== */
  .title-area {
    margin-bottom: 40px;
    animation: slideUp 0.6s ease-out;
    position: relative;
  }

  .big-fish {
    display: inline-block;
    animation: bobble 1.5s ease-in-out infinite;
  }

  .big-fish svg {
    width: 100px;
    height: 100px;
  }

  .main-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.6rem;
    color: var(--ink);
    margin: 8px 0 4px;
    line-height: 1.2;
    position: relative;
    display: inline-block;
  }

  .main-title::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 6px;
    background: var(--sun);
    border-radius: 3px;
    z-index: -1;
  }

  .sub-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--coral);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  .ocean-welcome {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    margin-top: 14px;
    display: inline-block;
    position: relative;
    background: linear-gradient(135deg, #4DABF7, #51CF66, #FFE156, #FF6B6B, #B197FC);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowText 4s linear infinite;
  }

  @keyframes rainbowText {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .ocean-welcome::before {
    content: '🌊';
    position: absolute;
    left: -32px;
    top: 50%;
    transform: translateY(-50%);
    -webkit-text-fill-color: initial;
    font-size: 1.4rem;
    animation: bobble 2s ease-in-out infinite;
  }

  .ocean-welcome::after {
    content: '🌊';
    position: absolute;
    right: -32px;
    top: 50%;
    transform: translateY(-50%);
    -webkit-text-fill-color: initial;
    font-size: 1.4rem;
    animation: bobble 2s ease-in-out infinite reverse;
  }

  /* ===== Buttons ===== */
  .btn-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: slideUp 0.8s ease-out;
  }

  .doodle-btn {
    display: block; width: 100%;
    padding: 20px 28px;
    border: 3px solid var(--ink);
    border-radius: 24px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.25rem;
    font-weight: 800;
    cursor: pointer;
    position: relative;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-decoration: none;
    color: var(--ink);
    box-shadow: 5px 5px 0px rgba(0,0,0,0.12);
    overflow: visible;
    letter-spacing: 0.5px;
  }

  .doodle-btn:hover {
    transform: translate(-2px, -4px);
    box-shadow: 8px 10px 0px rgba(0,0,0,0.15);
  }

  .doodle-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.12);
  }

  .btn-fish {
    background: linear-gradient(135deg, #FFE156 0%, #FFA94D 50%, #FF6B6B 100%);
  }

  .btn-fish .btn-emoji {
    font-size: 2rem; display: block; margin-bottom: 4px;
    animation: bobble 1.5s ease-in-out infinite;
  }

  .btn-fish .btn-label {
    display: block; font-size: 1rem; color: rgba(0,0,0,0.5);
    margin-top: 2px;
  }

  .btn-wu {
    background: linear-gradient(135deg, #B197FC 0%, #4DABF7 50%, #51CF66 100%);
  }

  .btn-wu .btn-emoji {
    font-size: 2rem; display: block; margin-bottom: 4px;
    animation: wiggleDoodle 2s ease-in-out infinite;
  }

  .btn-wu .btn-label {
    display: block; font-size: 1rem; color: rgba(0,0,0,0.5);
    margin-top: 2px;
  }

  /* ===== Paw / decorative doodle ===== */
  .corner-doodle {
    position: absolute;
    animation: floatAround 7s ease-in-out infinite;
    opacity: 0.8;
  }

  /* ===== SVG Doodle Fish ===== */
  @keyframes swimDoodle {
    0% { transform: translateX(-120px); }
    100% { transform: translateX(calc(100vw + 120px)); }
  }

  @keyframes swimDoodleReverse {
    0% { transform: translateX(calc(100vw + 120px)) scaleX(-1); }
    100% { transform: translateX(-120px) scaleX(-1); }
  }

  .swim-layer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 1;
    overflow: hidden;
  }

  .swimming-doodle {
    position: absolute;
    animation: swimDoodle linear infinite;
  }

  /* ===== Sparkles ===== */
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .sparkle {
    position: absolute;
    animation: twinkle 1.5s ease-in-out infinite;
    pointer-events: none;
  }

  /* ===== Responsive ===== */
  @media (max-width: 480px) {
    .container { padding: 16px; }
    .main-title { font-size: 2rem; }
    .doodle-btn { padding: 16px 20px; font-size: 1.1rem; }
    .big-fish svg { width: 70px; height: 70px; }
  }
</style>
</head>
<body>

<!-- Swimming doodle fish -->
<div class="swim-layer" id="swimLayer"></div>

<!-- Doodle background decorations -->
<div class="doodle-bg" id="doodleBg">
  <!-- Generated by JS -->
</div>

<!-- Main Container -->
<div class="container">

  <!-- Title -->
  <div class="title-area">
    <div class="big-fish">
      <!-- Doodle fish SVG -->
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <ellipse cx="55" cy="60" rx="40" ry="28" fill="#FFA94D" stroke="#2D3436" stroke-width="3"/>
        <!-- Tail -->
        <path d="M92 60 L118 38 L118 82 Z" fill="#FF6B6B" stroke="#2D3436" stroke-width="3" stroke-linejoin="round"/>
        <!-- Eye -->
        <circle cx="42" cy="52" r="6" fill="white" stroke="#2D3436" stroke-width="2.5"/>
        <circle cx="44" cy="51" r="3" fill="#2D3436"/>
        <!-- Mouth -->
        <path d="M34 65 Q40 72 48 65" stroke="#2D3436" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Fin -->
        <path d="M50 35 Q55 22 65 35" fill="#FFE156" stroke="#2D3436" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Scales doodle marks -->
        <path d="M48 48 Q52 44 56 48" stroke="#2D3436" stroke-width="1.5" fill="none" opacity="0.4"/>
        <path d="M52 55 Q56 51 60 55" stroke="#2D3436" stroke-width="1.5" fill="none" opacity="0.4"/>
        <path d="M44 56 Q48 52 52 56" stroke="#2D3436" stroke-width="1.5" fill="none" opacity="0.4"/>
        <!-- Bubbles -->
        <circle cx="25" cy="30" r="4" fill="none" stroke="#4DABF7" stroke-width="2"/>
        <circle cx="18" cy="18" r="3" fill="none" stroke="#4DABF7" stroke-width="2"/>
        <circle cx="22" cy="8" r="2" fill="none" stroke="#4DABF7" stroke-width="2"/>
      </svg>
    </div>
    <h1 class="main-title">Msuiting's Pond</h1>
    <p class="sub-title">✦ swim on in! ✦</p>
    <div class="ocean-welcome">welcome to suiting's ocean</div>
  </div>

  <!-- Buttons -->
  <div class="btn-area">
    <button class="doodle-btn btn-fish" onclick="location.href='/book.html'">
      <span class="btn-emoji">🐟</span>
      I'm Carrie's Fish
      <span class="btn-label">book a time with msuiting!</span>
    </button>

    <button class="doodle-btn btn-wu" id="btnWu">
      <span class="btn-emoji">🌊</span>
      I'm Wu
      <span class="btn-label">manage my pond</span>
    </button>
  </div>

</div>

<!-- Password Modal -->
<div id="passwordOverlay" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.45); z-index:100; display:none; align-items:center; justify-content:center;">
  <div style="background:var(--cream); border:3px solid var(--ink); border-radius:20px;
    padding:36px 28px; max-width:360px; width:90%; text-align:center;
    box-shadow:8px 8px 0px rgba(0,0,0,0.15); animation:popIn 0.4s ease-out;">
    <div style="font-size:3rem; margin-bottom:8px;">🔐</div>
    <h3 style="font-family:'Fredoka One',cursive; font-size:1.3rem; color:var(--ink); margin-bottom:4px;">
      Who goes there?
    </h3>
    <p style="font-size:0.85rem; color:rgba(0,0,0,0.5); margin-bottom:16px;">
      enter the secret password, Wu!
    </p>
    <input type="password" id="passwordInput"
      style="width:100%; padding:14px 18px; border:2.5px solid var(--ink); border-radius:14px;
      font-size:1.1rem; font-family:'Nunito',sans-serif; text-align:center; outline:none;
      background:white; color:var(--ink); margin-bottom:14px;"
      placeholder="••••••••" autofocus
      onkeydown="if(event.key==='Enter')checkPassword()">
    <button onclick="checkPassword()"
      style="width:100%; padding:14px; background:linear-gradient(135deg,#B197FC,#4DABF7);
      border:2.5px solid var(--ink); border-radius:14px; font-size:1.1rem; font-weight:800;
      font-family:'Nunito',sans-serif; color:var(--ink); cursor:pointer;
      box-shadow:4px 4px 0px rgba(0,0,0,0.12); transition:all 0.2s;">
      🗝️ Enter the Pond
    </button>
    <button onclick="closePassword()"
      style="margin-top:10px; background:none; border:none; color:rgba(0,0,0,0.4);
      font-size:0.85rem; cursor:pointer; font-family:'Nunito',sans-serif; text-decoration:underline;">
      nevermind!
    </button>
    <p id="pwError" style="color:var(--coral); font-weight:700; font-size:0.85rem;
      margin-top:8px; display:none;">❌ wrong password! try again~</p>
  </div>
</div>

<script>
// --- Create background doodle decorations ---
(function() {
  const bg = document.getElementById('doodleBg');

  // Draw doodle stars
  const starColors = ['#FFE156','#FF6B6B','#4DABF7','#51CF66','#B197FC'];
  for (let i = 0; i < 12; i++) {
    const star = document.createElement('div');
    star.className = 'floater';
    star.innerHTML = `<svg width="${18 + Math.random()*24}" height="${18 + Math.random()*24}" viewBox="0 0 30 30">
      <path d="M15 2 L18 11 L27 11 L20 17 L22 26 L15 21 L8 26 L10 17 L3 11 L12 11 Z"
        fill="${starColors[Math.floor(Math.random()*5)]}" stroke="#2D3436" stroke-width="1.8"
        stroke-linejoin="round"/>
    </svg>`;
    star.style.top = (Math.random() * 90) + '%';
    star.style.left = (Math.random() * 90) + '%';
    star.style.animationDuration = (6 + Math.random() * 6) + 's';
    star.style.animationDelay = (Math.random() * 5) + 's';
    star.style.animationName = ['floatAround','floatAround2','floatAround3'][Math.floor(Math.random()*3)];
    bg.appendChild(star);
  }

  // Draw doodle dots/clusters
  for (let i = 0; i < 8; i++) {
    const dot = document.createElement('div');
    dot.className = 'floater';
    const cols = ['#FFA94D','#F06595','#4DABF7','#51CF66'];
    dot.innerHTML = `<svg width="40" height="20" viewBox="0 0 40 20">
      <circle cx="6" cy="8" r="5" fill="${cols[i%4]}" stroke="#2D3436" stroke-width="1.5"/>
      <circle cx="20" cy="12" r="4" fill="${cols[(i+1)%4]}" stroke="#2D3436" stroke-width="1.5"/>
      <circle cx="34" cy="7" r="5" fill="${cols[(i+2)%4]}" stroke="#2D3436" stroke-width="1.5"/>
    </svg>`;
    dot.style.top = (Math.random() * 85) + '%';
    dot.style.left = (Math.random() * 85) + '%';
    dot.style.animationDuration = (7 + Math.random() * 8) + 's';
    dot.style.animationDelay = (Math.random() * 6) + 's';
    bg.appendChild(dot);
  }
})();

// --- Create swimming doodle fish ---
(function() {
  const layer = document.getElementById('swimLayer');
  const fishData = [
    { emoji:'🐠', color:'#FF6B6B', y:15, dur:18, delay:0, size:'2rem' },
    { emoji:'🐟', color:'#4DABF7', y:35, dur:22, delay:3, size:'1.8rem' },
    { emoji:'🐡', color:'#FFA94D', y:55, dur:20, delay:7, size:'1.6rem' },
    { emoji:'🐠', color:'#F06595', y:72, dur:25, delay:2, size:'1.4rem' },
    { emoji:'🐟', color:'#51CF66', y:85, dur:19, delay:5, size:'1.7rem' },
    { emoji:'🐙', color:'#B197FC', y:45, dur:28, delay:9, size:'1.9rem' },
  ];

  fishData.forEach(f => {
    const el = document.createElement('div');
    el.className = 'swimming-doodle';
    el.textContent = f.emoji;
    el.style.top = f.y + '%';
    el.style.fontSize = f.size;
    el.style.animationDuration = f.dur + 's';
    el.style.animationDelay = f.delay + 's';
    // Some swim the other way
    if (Math.random() > 0.5) {
      el.style.animationName = 'swimDoodleReverse';
    }
    layer.appendChild(el);
  });
})();

// --- Password modal ---
const overlay = document.getElementById('passwordOverlay');

document.getElementById('btnWu').addEventListener('click', () => {
  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('passwordInput').focus(), 100);
});

function closePassword() {
  overlay.style.display = 'none';
  document.getElementById('pwError').style.display = 'none';
  document.getElementById('passwordInput').value = '';
}

function checkPassword() {
  const pw = document.getElementById('passwordInput').value.trim();
  if (pw === 'msuiting2026') {
    window.location.href = '/admin.html';
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
    // Shake effect
    const card = overlay.querySelector('div');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'popIn 0.4s ease-out';
  }
}

// Close overlay on background click
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closePassword();
});
</script>

</body>
</html>
